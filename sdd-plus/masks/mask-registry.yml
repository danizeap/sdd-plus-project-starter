version: 0.1.0
registry_name: Codex Mask Registry
owner: Daniel
description: >
  Registry of reusable Codex operating procedures for AI-assisted software development.

rules:
  require_mask_selection_before_meaningful_work: true
  require_primary_mask: true
  allow_supporting_masks: true
  propose_new_mask_if_no_fit: true
  require_evidence_report: true

statuses:
  placeholder: named but not designed yet
  draft: designed but not battle-tested
  active: usable as a Codex operating procedure
  graduated: became its own tool, repo, workflow, or formal subsystem
  deprecated: replaced or no longer recommended

masks:
  - id: launchguardian
    name: LaunchGuardian Mask
    status: graduated
    version: 0.1.0
    path: sdd-plus/masks/launchguardian/mask.md
    purpose: Secure-shipping review for repos before launch.
    primary_use_cases:
      - Review whether a repo is safe enough to ship.
      - Validate LaunchGuardian Framework files.
      - Run local defensive scanner checks.
    supporting_use_cases:
      - Final review after backend, frontend, API, database, or MCP changes.
    tool_repo: launchguardian-cli
    framework_docs:
      - sdd-plus/specs/launchguardian-framework.md
      - sdd-plus/specs/launchguardian-cli-product-spec.md

  - id: architect
    name: Architect Mask
    status: active
    version: 0.1.0
    path: sdd-plus/masks/architect/mask.md
    purpose: Plan system architecture before implementation and produce a Build Blueprint.
    primary_use_cases:
      - Plan a new software product, app, internal tool, or AI system before implementation.
      - Define components, data flow, API boundaries, auth assumptions, risks, and implementation phases.
      - Decide which implementation mask should be used next.
    supporting_use_cases:
      - Pre-work before Backend, Frontend, API Contract, Database Steward, Testing, MCP Ranger, or LaunchGuardian masks.

  - id: backend
    name: Backend Mask
    status: active
    version: 0.1.1
    path: sdd-plus/masks/backend/mask.md
    purpose: Guide safe, permissioned, testable, maintainable backend implementation and review.
    primary_use_cases:
      - Implement or review backend routes, handlers, services, server actions, jobs, webhooks, integrations, or data mutations.
      - Validate backend auth, authorization, object-level access, input handling, errors, logging, config, and operational readiness.
      - Prevent vibe-coded backend diffs by requiring lightweight change planning, pattern discipline, ownership maps, test intent, and clear layer boundaries.
    supporting_use_cases:
      - Implementation after Architect Mask planning.
      - Pre-launch backend evidence before LaunchGuardian review.

  - id: api-contract
    name: API Contract Mask
    status: active
    version: 0.1.0
    path: sdd-plus/masks/api-contract/mask.md
    purpose: Design and review clear, permissioned, stable, testable API contracts before implementation.
    primary_use_cases:
      - Design or review new, modified, deleted, internal, external, webhook, agent/tool, or client-facing API contracts.
      - Define endpoint purpose, caller, request/response shape, auth, object authorization, errors, data exposure, pagination, idempotency, versioning, and client impact.
      - Prevent vague, unsafe, breaking, undocumented, or inconsistent API boundaries before Backend, Frontend, Database Steward, Testing, or LaunchGuardian work.
    supporting_use_cases:
      - Contract design after Architect Mask planning.
      - API boundary definition before Backend, Frontend, Database Steward, Testing, or LaunchGuardian review.

  - id: database-steward
    name: Database Steward Mask
    status: active
    version: 0.1.0
    path: sdd-plus/masks/database-steward/mask.md
    purpose: Design and review database/storage safety, ownership, tenant isolation, migrations, indexes, retention, deletion, audit trails, backups, and RAG/vector storage.
    primary_use_cases:
      - Design or review database schemas, migrations, indexes, constraints, seed data, imports, exports, deletion, retention, audit logs, RLS policies, and storage behavior.
      - Prevent unowned, unsafe, irreversible, unindexed, unrecoverable, or privacy-dangerous data structures.
      - Review RAG/vector storage metadata, access boundaries, source links, and deletion behavior.
    supporting_use_cases:
      - Data model review after Architect Mask planning.
      - Storage and lifecycle review before Backend, API Contract, Testing, or LaunchGuardian work depends on the data model.

  - id: codebase-cartographer
    name: Codebase Cartographer Mask
    status: active
    version: 0.1.0
    path: sdd-plus/masks/codebase-cartographer/mask.md
    purpose: Create and maintain durable repo maps so Codex can understand codebases efficiently without rereading everything every time.
    primary_use_cases:
      - Create durable repo maps before broad work in an existing codebase.
      - Update codebase maps after architecture, API, data, integration, test, or risk-area changes.
      - Orient future Codex sessions with read-first guides and map freshness notes.
    supporting_use_cases:
      - Repo understanding before Architect, API Contract, Database Steward, Backend, Frontend, Testing, MCP Ranger, or LaunchGuardian work.

  - id: frontend
    name: Frontend Mask
    status: placeholder
    version: 0.0.0
    path: sdd-plus/masks/frontend/mask.md
    purpose: Guide frontend/UI implementation.

  - id: testing
    name: Testing Mask
    status: active
    version: 0.1.0
    path: sdd-plus/masks/testing/mask.md
    purpose: Prove meaningful behavior with appropriate tests, verification commands, and evidence reports.

  - id: explainer
    name: Explainer Mask
    status: placeholder
    version: 0.0.0
    path: sdd-plus/masks/explainer/mask.md
    purpose: Explain code, architecture, and implementation decisions clearly for Daniel.

  - id: mcp-ranger
    name: MCP Ranger Mask
    status: placeholder
    version: 0.0.0
    path: sdd-plus/masks/mcp-ranger/mask.md
    purpose: Review MCP/tool integrations, permissions, data access, and revocation risks.
